<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AltDiscard — Options</title>
  </head>
  <body>
    <fieldset>
      <legend>How to Use</legend>
      <div>
        <ul>
          <li><strong>Alt+Click</strong> a link → opens discarded (unloaded)</li>
          <li><strong>Right-click</strong> a link → ⭐ Open in Discarded Tab</li><br>
          <li><strong>Regular click</strong> → opens normally</li>
          <li><strong>Ctrl+Click</strong> → opens normally in new tab</li>
        </ul>
        <p>No configuration needed. Works out of the box.(due to make it straight forward)</p>
      </div>
    </fieldset>
  </body>
</html>
